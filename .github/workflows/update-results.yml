name: Actualizar resultados

# Trae los resultados reales del Mundial y los commitea como public/results.json.
# El push dispara un redeploy automático en Vercel. El token vive en Secrets, nunca
# llega al cliente.
#
# La cadencia real (cada ~30 min) la maneja un cron EXTERNO que dispara este workflow
# vía `workflow_dispatch` por API: los `schedule` de GitHub se postergan/saltean horas
# y no son confiables. El `schedule` de abajo queda solo como red de seguridad esparcida.
# Ver docs/OPERACION_RESULTADOS.md.

on:
  schedule:
    # Fallback esparcido (cada 6 h, minuto 17 para evitar la congestión del top-of-hour).
    # El disparo de 30 min lo hace el pinger externo (workflow_dispatch).
    - cron: '17 */6 * * *'
  workflow_dispatch: # disparo manual y del pinger externo (cron-job.org)

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Ventana del torneo (10/06–20/07/2026)
        id: window
        run: |
          today=$(date -u +%Y-%m-%d)
          if [[ "$today" < "2026-06-10" || "$today" > "2026-07-20" ]]; then
            echo "Fuera de la ventana del torneo ($today). Se omite."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.window.outputs.run == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.window.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.window.outputs.run == 'true'

      - name: Traer resultados
        if: steps.window.outputs.run == 'true'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: npm run update:results

      - name: Commit si hubo cambios
        if: steps.window.outputs.run == 'true'
        run: |
          if [[ -z "$(git status --porcelain public/results.json public/awards.json)" ]]; then
            echo "Sin cambios en results.json ni awards.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results.json public/awards.json
          git commit -m "chore: actualizar resultados y premios [skip ci]"
          # main pudo avanzar (push manual u otra corrida). results.json es generado:
          # ante conflicto nos quedamos con NUESTRA versión (-X theirs en el rebase).
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rechazado (main avanzó); rebase y reintento $i…"
            git pull --rebase -X theirs origin main || git rebase --abort || true
            sleep $((RANDOM % 4 + 2))
          done
          echo "No se pudo pushear tras varios intentos."
          exit 1
