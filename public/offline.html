<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sin conexión · Mundial 2026</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #0e1320;
        color: #e5edf5;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .ball {
        font-size: 3.5rem;
      }
      h1 {
        margin: 0.75rem 0 0.25rem;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #9fb0c3;
        max-width: 22rem;
      }
      button {
        margin-top: 1.5rem;
        background: #0ea5e9;
        color: #fff;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="ball">⚽️</div>
      <h1>Estás sin conexión</h1>
      <p>
        No pudimos cargar esta pantalla. Revisá tu conexión: las pantallas que ya visitaste siguen
        funcionando sin internet.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
